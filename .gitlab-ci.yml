# .gitlab-ci.yml
# AI 서비스 (ai-service-be) GitLab CI/CD 파이프라인
# 흐름: LLM-as-Judge Eval → Docker Build & Push → 배포

stages:
  - eval
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  PYTHON_VERSION: "3.11"
  EVAL_PASS_THRESHOLD: "0.75"   # 이 점수 미만이면 배포 차단

# =============================================
# Stage 1. LLM-as-Judge Eval
# 추천 품질 점수가 임계값 이상일 때만 다음 단계 진행
# =============================================
agent-eval:
  stage: eval
  image: python:3.11-slim
  
  # 서비스: pgvector (벡터 검색 테스트용)
  services:
    - name: postgres:16
      alias: postgres
      variables:
        POSTGRES_DB: moneylog_vector_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: test1234

  variables:
    # 테스트용 DB (실제 RDS 아님)
    VECTOR_DB_HOST: postgres
    VECTOR_DB_PORT: "5432"
    VECTOR_DB_NAME: moneylog_vector_test
    VECTOR_DB_USER: postgres
    VECTOR_DB_PASSWORD: test1234

  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
    # pgvector 설치
    - apt-get update && apt-get install -y postgresql-client
    - |
      until pg_isready -h postgres -U postgres; do
        echo "Waiting for postgres..."
        sleep 2
      done
    - psql -h postgres -U postgres -d moneylog_vector_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

  script:
    - echo "🔍 LLM-as-Judge 평가 시작..."
    - python eval.py
    - echo "✅ 평가 완료"

  # eval.py 종료 코드로 pass/fail 판단
  # eval.py에서 임계값 미달 시 sys.exit(1) 호출 필요
  allow_failure: false

  artifacts:
    when: always
    paths:
      - eval_result.json
    expire_in: 7 days
    reports:
      # GitLab에서 결과 시각화
      dotenv: eval.env

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


# =============================================
# Stage 2. Docker Build & Push
# eval 통과 시에만 실행
# =============================================
build-and-push:
  stage: build
  image: docker:24
  
  services:
    - docker:24-dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

  script:
    - echo "🐳 Docker 이미지 빌드 중..."
    - |
      docker build \
        --tag $IMAGE_NAME:latest \
        --tag $IMAGE_NAME:$CI_COMMIT_SHA \
        .
    - docker push $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - echo "✅ 이미지 푸시 완료 - $IMAGE_NAME:$CI_COMMIT_SHA"

  needs:
    - job: agent-eval
      artifacts: false

  rules:
    - if: $CI_COMMIT_BRANCH == "main"


# =============================================
# Stage 3. 배포 (ArgoCD manifest 업데이트)
# =============================================
update-manifest:
  stage: deploy
  image: alpine/git:latest

  before_script:
    - git config --global user.name "gitlab-ci-bot"
    - git config --global user.email "gitlab-ci-bot@noreply.gitlab.com"
    # GitLab token으로 push 권한 설정
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

  script:
    - echo "📝 ArgoCD 매니페스트 업데이트 중..."
    - |
      sed -i "s|image: .*|image: $IMAGE_NAME:$CI_COMMIT_SHA|" deployment/deployment.yaml
    - |
      if git diff --quiet; then
        echo "변경사항 없음 - 스킵"
        exit 0
      fi
    - git add deployment/deployment.yaml
    - git commit -m "chore: update image tag to $CI_COMMIT_SHA [skip ci]"
    - git push origin $CI_COMMIT_BRANCH
    - echo "✅ 매니페스트 업데이트 완료"

  needs:
    - job: build-and-push
      artifacts: false

  rules:
    - if: $CI_COMMIT_BRANCH == "main"