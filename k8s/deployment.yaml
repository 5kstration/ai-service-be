apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: moneylog
  labels:
    app: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: 525089404962.dkr.ecr.ap-northeast-2.amazonaws.com/ai-service-be:156
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-service-secret
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"