apiVersion: v1
kind: Secret
metadata:
  name: langfuse-postgres-secret
  namespace: monitoring
type: Opaque
stringData:
  POSTGRES_DB: langfuse
  POSTGRES_USER: langfuse
  POSTGRES_PASSWORD: langfuse1234   # 변경 권장
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgres
  namespace: monitoring
  labels:
    app: langfuse-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-postgres
  template:
    metadata:
      labels:
        app: langfuse-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: langfuse-postgres-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres   # NFS 루트에 직접 마운트 방지
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: langfuse-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-pvc
  namespace: monitoring
spec:
  storageClassName: nfs-client
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432